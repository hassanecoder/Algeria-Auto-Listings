packages:
  "framer-motion": "Animations for cards, page transitions, and hero section"
  "react-hook-form": "Complex form handling for the post ad page"
  "@hookform/resolvers": "Zod integration for form validation"
  "embla-carousel-react": "Image gallery carousel for the listing detail page"
  "zustand": "Global state management for the 'Compare Cars' feature"
  "date-fns": "Human-readable date formatting for listings"

images:
  - path: "artifacts/car-listings/public/images/hero-bg.png"
    description: "Abstract modern sleek dark studio lighting revealing the silhouette of a sports car, bold red accents, cinematic, 4k, photorealistic"
    aspect_ratio: "16:9"
  - path: "artifacts/car-listings/public/images/logo.png"
    description: "Modern minimalist geometric logo for a car marketplace named DZ Cars, sharp angles, automotive feel, bold red and black on transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/car-listings/public/images/placeholder-car.png"
    description: "A clean, studio shot of a generic modern SUV in metallic silver, grey background, soft lighting"
    aspect_ratio: "4:3"

notes:
  - Using generated API hooks from @workspace/api-client-react
  - Implemented robust mock data fallbacks for when the backend is unavailable or empty
  - Zustand used for cross-page compare functionality
