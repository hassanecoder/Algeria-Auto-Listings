kind = "web"
previewPath = "/"
title = "DZ Cars - Algeria Vehicle Listings"
version = "1.0.0"
id = "artifacts/car-listings"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23669

[services.development]
run = "pnpm --filter @workspace/car-listings run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-listings", "run", "build" ]
publicDir = "artifacts/car-listings/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23669"
BASE_PATH = "/"
